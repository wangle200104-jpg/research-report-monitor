schedule:
  check_times:
    - "08:30"
    - "12:00"
    - "18:00"
  interval_minutes: 0

download:
  output_dir: "./reports"
  download_pdf: true
  max_concurrent: 3
  max_file_size_mb: 50

sources:
  eastmoney:
    enabled: true
    page_size: 50
  cninfo:
    enabled: true
    page_size: 30
  gelonghui:
    enabled: false
    page_size: 20
  rss:
    enabled: false
    rsshub_base: "https://rsshub.app"
    feeds:
      - name: "东方财富-行业研报"
        path: "/eastmoney/report/industry"
        enabled: true
      - name: "东方财富-个股研报"
        path: "/eastmoney/report/stock"
        enabled: true
      - name: "财联社-电报"
        path: "/cls/telegraph"
        enabled: false
    custom_urls: []
  akshare:
    enabled: false

notification:
  console: true
  log_file: "./logs/monitor.log"
  desktop_notify: false

dedup:
  history_file: "./data/download_history.json"
  keep_days: 90

log_level: "INFO"
